<!-- How to Get There -->
<section class="wrapper style1 align-center directions-section" id="directions">
    <div class="inner">
        <h2>{{ i18n "directions_title" }}</h2>
        <div class="directions-grid">
            <div class="direction-card">
                <i class="fas fa-bus"></i>
                <h3>{{ i18n "directions_bus_title" }}</h3>
                <p>{{ i18n "directions_bus_text" }}</p>
            </div>
            <div class="direction-card">
                <i class="fas fa-plane"></i>
                <h3>{{ i18n "directions_flight_title" }}</h3>
                <p>{{ i18n "directions_flight_text" }}</p>
            </div>
            <div class="direction-card">
                <i class="fas fa-taxi"></i>
                <h3>{{ i18n "directions_taxi_title" }}</h3>
                <p>{{ i18n "directions_taxi_text" }}</p>
            </div>
        </div>
    </div>
</section>
