<!-- Banner -->
<section class="banner-mosaic" id="{{ .id }}">
    <div class="banner-mosaic-inner">
        <div class="gallery lightbox banner-mosaic-grid">
            {{ range $i, $img := .heroImages }}
            <article class="{{ if eq $i 0 }}mosaic-hero{{ else }}mosaic-thumb{{ end }}">
                <a href="{{ $img.src | relURL }}" class="image">
                    <img src="{{ $img.src | relURL }}" alt="{{ $img.alt }}" {{ if eq $i 0 }}loading="eager"{{ else }}loading="lazy"{{ end }} />
                </a>
                {{ if eq $i 0 }}
                <div class="banner-mosaic-overlay">
                    <h1>{{ i18n "banner.title" }}</h1>
                    <p class="major">{{ i18n "banner.subtitle" }}</p>
                </div>
                {{ end }}
            </article>
            {{ end }}
        </div>
    </div>
</section>
