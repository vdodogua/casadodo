## -----------------------------------------------
## Basic Configuration
## -----------------------------------------------
baseURL = 'https://casadodoguatape.com/'
languageCode = 'en-us'
title = 'Casa Dodo Guatapé'
theme = "hugo-story"
copyright = "{year}"

## -----------------------------------------------
## Publish
## -----------------------------------------------

relativeURLs = "true"
#canonifyURLs = "true"

# Local
#baseURL = '/'
publishDir = "public"


# Add multilingual support
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
[languages]
  [languages.en]
    languageName = "en"
    weight = 1
    contentDir = "content"
    title = "Casa Dodo Guatapé"
  [languages.es]
    languageName = "es"
    weight = 2
    contentDir = "content"
    title = "Casa Dodo Guatapé - Alojamiento Boutique"
  [languages.fr]
    languageName = "fr"
    weight = 3
    contentDir = "content"
    title = "Casa Dodo Guatapé - Hébergement Boutique"

## -----------------------------------------------
## Site Parameters
## -----------------------------------------------
[Params]
  description = "Experience the beauty of Guatapé at Casa Dodo, a boutique hotel offering stunning views and exceptional service."
  keywords = "Guatapé hotel, Casa Dodo, boutique hotel, Guatapé accommodation, Colombian hospitality"
  blogURL = "https://guatapefreewalkingtour.com/blog/"
  #images = ["/images/casa-dodo-og.jpg"]
  lobbyPMSBookingURL = "https://engine.lobbypms.com/casa-dodo-guatap-"
  #plausibleAnalytics = "casadodoguatape.com"
  logo = "images/logo.png"
  favicon = false   

  # Features icons
  [Params.icons]
    icon1 = "fa-home" 
    icon2 = "fa-camera-retro"
    icon3 = "fa-concierge-bell" 

  
  [Params.social]
    instagram = "https://www.instagram.com/casadodoguatape/"
    facebook = "https://www.facebook.com/casadodoguatape"

