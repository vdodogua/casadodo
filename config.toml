[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

uglyURLs = false

enableRobotsTXT = true

# Add/update these sections
disableKinds = ["taxonomy", "taxonomyTerm", "term", "RSS", "categories", "tags", "section"]

[outputs]
  home = ["HTML", "SITEMAP"]
  page = ["HTML"]

